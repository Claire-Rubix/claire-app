/* =========================== STATE / UTILS =========================== */
let lang="fr";
const t=k=>I18N[lang][k];
const $=s=>document.querySelector(s);
const stage=$("#stage");
const src=p=>encodeURI(p);
const up=()=>lang==="fr"?"FR":"EN";
const initial=s=>(s||"?").trim().charAt(0).toUpperCase();
const norm=s=>(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]/g,"");
let S={view:"intro",current:0,done:{},scores:{},km:0,dplus:0,total:0,timer:null,raph:{},lastShown:null,ravSeen:{}};

function hud(){const v=Object.keys(S.done).length;return `<div class="hud">
  <div class="stat"><b>${S.km}</b><span>${t('hudKm')}</span></div>
  <div class="stat"><b>${(S.km/70).toFixed(1)}</b><span>${t('hudYears')}</span></div>
  <div class="stat"><b>${S.dplus}</b><span>${t('hudD')}</span></div>
  <div class="stat"><b>${v}/${CONFIG.ravitos.length}</b><span>${t('hudRav')}</span></div>
  <div class="stat"><b>${S.total}</b><span>${t('hudPts')}</span></div></div>`;}
function firstOpenIdx(){for(let i=0;i<CONFIG.ravitos.length;i++)if(!S.done[CONFIG.ravitos[i].id])return i;return -1;}
function esc(s){return (s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function openLB(s,f){const lb=$("#lightbox");if(!lb)return;const im=$("#lbimg");im.src=s;im.style.filter=f||'none';lb.classList.add("on");}
$("#lightbox").onclick=()=>$("#lightbox").classList.remove("on");
function faceImg(path){return `<img src="${src(path)}" onerror="this.style.display='none'">`;}

/* =========================== ROUTER =========================== */
function gateOK(){return S.motMode||S.view==='motslist'||!CONFIG.password||S.view==='addword'||sessionStorage.getItem("tl_ok")==="1";}
function showGate(){
  stage.innerHTML=`<div class="card" style="max-width:420px;margin:30px auto;text-align:center">
    <span class="kicker">🔒 Accès</span><h2>Mot de passe</h2>
    <input type="password" id="gpw" style="text-transform:none;letter-spacing:1px;text-align:center" placeholder="Mot de passe" autocomplete="off">
    <div id="gfb" style="color:var(--bad);font-weight:bold;margin-top:8px"></div>
    <div class="row" style="justify-content:center"><button class="btn" id="gok">Entrer</button></div></div>`;
  const tryp=()=>{if($("#gpw").value===CONFIG.password){sessionStorage.setItem("tl_ok","1");render();}else{$("#gfb").textContent="Mot de passe incorrect.";$("#gpw").value="";}};
  $("#gok").onclick=tryp;$("#gpw").addEventListener("keydown",e=>{if(e.key==="Enter")tryp();});$("#gpw").focus();
}
function render(){
  if(location.hash==='#mot'){S.motMode=true;S.view='addword';}   // visiteur "mot" : verrouille sur le formulaire, jamais le jeu
  if(!gateOK())return showGate();
  pickMusic(S.view);
  if(S.view==='intro')return intro();
  if(S.view==='map')return world();
  if(S.view==='play')return play();
  if(S.view==='ravito')return ravito();
  if(S.view==='addword')return addword();
  if(S.view==='motslist')return motslist();
  if(S.view==='finish')return finish();
}

/* =========================== INTRO =========================== */
function intro(){
  stage.innerHTML=`<div class="card introwrap">
    <img src="LN/logo-rubix.png" alt="RUBIX" style="height:44px;border-radius:8px;margin-bottom:6px" onerror="this.outerHTML='<span class=\'kicker\'>RUBIX</span>'"><h1>The Last Trail</h1>
    <video id="introvid" src="${src(CONFIG.introVideo)}" controls autoplay playsinline></video>
    <div class="row" style="justify-content:center">
      <button class="btn" id="introGo">${t('introStart')}</button>
    </div></div>`;
  const v=$("#introvid");
  if(v){v.onended=()=>go();v.play&&v.play().catch(()=>{});}
  function go(){toggleMusic(true);S.view="map";render();}
  $("#introGo").onclick=go;
}

function pine(w,c1,c2){return `<svg width="${w}" viewBox="0 0 40 64"><ellipse cx="20" cy="61" rx="13" ry="3.5" fill="rgba(0,0,0,.18)"/><rect x="17.5" y="46" width="5" height="14" rx="1.5" fill="#6b4a2e"/><polygon points="20,4 32,26 8,26" fill="${c1}"/><polygon points="20,4 32,26 20,26" fill="${c2}"/><polygon points="20,16 35,42 5,42" fill="${c1}"/><polygon points="20,16 35,42 20,42" fill="${c2}"/><polygon points="20,30 39,56 1,56" fill="${c1}"/><polygon points="20,30 39,56 20,56" fill="${c2}"/></svg>`;}
function mountSVG(w,h,fill,fill2,snow,n,amp,base){
  let top=`0,${h}`;const ys=[];
  for(let i=0;i<=n;i++){const x=Math.round(w*i/n);const y=Math.round(base-amp*(0.5+0.5*Math.abs(Math.sin(i*1.3+0.7))));ys.push([x,y]);top+=` ${x},${y}`;}
  top+=` ${w},${h}`;let caps="";
  if(snow)ys.forEach(p=>{if(p[1]<base-amp*0.7)caps+=`<polygon points="${p[0]},${p[1]} ${p[0]-12},${p[1]+16} ${p[0]+12},${p[1]+16}" fill="${snow}" opacity=".92"/>`;});
  const gid="g"+Math.round(amp*10)+fill.replace(/[^a-z0-9]/gi,"");
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${fill}"/><stop offset="1" stop-color="${fill2}"/></linearGradient></defs><polygon points="${top}" fill="url(#${gid})"/>${caps}</svg>`;
}
function treeRow(w,count,sMin,sMax,c1,c2,bottom){let s="";for(let i=0;i<count;i++){const x=Math.round((i+0.5)*w/count+((i*53)%37)-18);const sz=Math.round(sMin+((i*29)%100)/100*(sMax-sMin));s+=`<span class="tree" style="left:${x}px;bottom:${bottom}px">${pine(sz,c1,c2)}</span>`;}return s;}
const skyGrad=TH=>`linear-gradient(180deg,${TH.sky[0]} 0%,${TH.sky[1]} 26%,${TH.sky[2]} 44%,${TH.sky[3]} 60%,${TH.gtop} 72%)`;
function terrainY(x){const v=Math.sin(x/330)*52+Math.sin(x/130+1.6)*17;return Math.round(v<-20?-20:v);}
function groundSVG(w,TH){
  const H=150,TOP=100;let top=`0,${H}`;const line=[];
  for(let x=0;x<=w;x+=24){const y=TOP-terrainY(x);line.push(`${x},${y}`);top+=` ${x},${y}`;}
  top+=` ${w},${H}`;const gid="grd"+TH.g[0].replace(/[^a-z0-9]/gi,"");
  return `<svg width="${w}" height="${H}" viewBox="0 0 ${w} ${H}" preserveAspectRatio="none" style="position:absolute;left:0;bottom:0">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${TH.g[0]}"/><stop offset="1" stop-color="${TH.g[1]}"/></linearGradient></defs>
    <polygon points="${top}" fill="url(#${gid})"/>
    <polyline points="${line.join(' ')}" fill="none" stroke="#e6d6a4" stroke-width="11" vector-effect="non-scaling-stroke" opacity=".95"/>
    <polyline points="${line.join(' ')}" fill="none" stroke="#fffaf0" stroke-width="2" stroke-dasharray="6 9" vector-effect="non-scaling-stroke"/></svg>`;
}

/* =========================== PLAY DISPATCH + AWARD =========================== */
function play(){const r=CONFIG.ravitos[S.current];
  if(r.game==='anagram')return anagram(r);
  if(r.game==='truefalse')return truefalse(r);
  if(r.game==='memory')return memory(r);
  if(r.game==='pace')return pace(r);
  if(r.game==='geo')return geo(r);
  if(r.game==='puzzle')return puzzle(r);
  return mcqPhoto(r); /* photo + year + detail */}

function afterChallenge(){S.browse=null;const dc=Object.keys(S.done).length;
  if(firstOpenIdx()!==-1&&(dc===3||dc===6)&&!S.ravSeen[dc]){S.ravSeen[dc]=true;S.ravType=(dc===6?'climb':'catch');S.view="ravito";}
  else S.view=(firstOpenIdx()===-1)?"finish":"map";
  render();}
function award(r,pts,correct,reveal){
  sfx(correct?'good':'bad');
  if(correct){S.streak=(S.streak||0)+1;}else{S.streak=0;}
  const combo=correct&&S.streak>=3;if(combo)pts=Math.round(pts*2);
  if(!S.done[r.id]){S.done[r.id]=true;S.scores[r.id]=pts;S.km+=r.km;S.dplus+=r.dplus;S.total+=pts;}
  const last=firstOpenIdx()===-1;
  return `<div class="feedback ${correct?'good':'meh'}">${correct?t('correctTxt'):t('wrongTxt')} ${correct?'+'+pts+' pts'+(combo?' 🔥 COMBO x2 !':''):''}. ${reveal}</div>
    <div class="row"><button class="btn" id="cont">${last?t('summitBtn'):t('nextRavito')}</button></div>`;}
function bindCont(){const c=$("#cont");if(c)c.onclick=afterChallenge;}
function copilotBox(id,label){return `<div class="copilot"><div class="cpf">${initial(CONFIG.copilot.name)}${faceImg(CONFIG.copilot.face)}</div>
  <div class="cot"><b>${CONFIG.copilot.name}</b> : <span id="raphtxt">${CONFIG.copilot[lang==='fr'?'introFR':'introEN']}</span>

  upd();if(S.timer)clearInterval(S.timer);
  S.timer=setInterval(()=>{left--;if(left<=0){left=0;upd();timeUp();}else upd();},1000);
  const rb=$("#raph");if(rb)rb.onclick=()=>{if(S.raph[r.id])return;S.raph[r.id]=true;rb.disabled=true;maxPts=Math.round(maxPts*0.7);
    [...stage.querySelectorAll(".opt")].filter(o=>+o.dataset.i!==r.correct).slice(0,1).forEach(o=>o.classList.add("gone"));
    const rt=$("#raphtxt");if(rt&&r["tip"+up()])rt.textContent=r["tip"+up()];upd();};
  function lockOpts(ch){clearInterval(S.timer);img.style.filter=r.bw?"grayscale(1)":"none";
    stage.querySelectorAll(".opt").forEach(o=>{const k=+o.dataset.i;if(k===r.correct)o.classList.add("correct");else if(k===ch)o.classList.add("wrong");o.disabled=true;});}
  function done(correct){answered=true;const pts=correct?curPts():0;$("#mfb").innerHTML=award(r,pts,correct,r["reveal"+up()]);bindCont();if(correct)burst();}
  function timeUp(){if(answered)return;lockOpts(-1);done(false);$("#mfb").insertAdjacentHTML("afterbegin",`<div class="feedback meh">${t('timeUp')}</div>`);}
  stage.querySelectorAll(".opt").forEach(o=>{o.onclick=()=>{if(answered||o.classList.contains("gone"))return;const i=+o.dataset.i;lockOpts(i);done(i===r.correct);};});

/* ---- allure (guess pace within tolerance) ---- */
function paceSec(s){const m=(s||"").match(/(\d{1,2})\s*[:hm'.,]\s*(\d{1,2})/);if(m)return (+m[1])*60+(+m[2]);const d=(s||"").replace(/\D/g,"");if(d.length>=3)return (+d.slice(0,d.length-2))*60+(+d.slice(-2));if(d.length)return (+d)*60;return null;}
function pace(r){
  const total=CONFIG.chronoSeconds+10;let left=total,answered=false,maxPts=1000;const target=paceSec(r.paceAnswer);
  stage.innerHTML=hud()+`<div class="card">
    <span class="kicker">${t('challengeOf')} ${esc(r.who)}</span>
    ${r.photo?`<div class="photowrap"><img src="${src(r.photo)}" style="filter:none" onerror="this.style.display='none'"></div>`:""}
    <h2>⏱️ ${r["q"+up()]}</h2>
    <div class="ptsbar"><div class="ptsfill" id="ptsfill" style="width:100%"></div></div>
    <div class="ptslabel"><span id="pts">${maxPts}</span> ${t('points')} · <span id="chrono">${left}s</span></div>
    <div class="row"><input type="text" id="ans" placeholder="min:sec" autocomplete="off"><button class="btn" id="ok">${t('validate')}</button></div>
    <div id="rfb" style="margin-top:10px;font-weight:bold"></div>${copilotBox('raph',t('askRaph'))}</div>`;
  const ptsEl=$("#pts"),fill=$("#ptsfill"),chrono=$("#chrono");
  const curPts=()=>Math.max(100,Math.round(maxPts*left/total));
  const upd=()=>{chrono.textContent=left+"s";const p=curPts();ptsEl.textContent=p;fill.style.width=(p/1000*100)+"%";};
  upd();if(S.timer)clearInterval(S.timer);S.timer=setInterval(()=>{left--;if(left<=0){left=0;upd();fail();}else upd();},1000);
  function win(){answered=true;clearInterval(S.timer);$("#rfb").innerHTML=award(r,curPts(),true,r["reveal"+up()]);bindCont();burst();}
  function fail(){answered=true;clearInterval(S.timer);$("#rfb").innerHTML=award(r,0,false,r["reveal"+up()]);bindCont();}
  function tryA(){if(answered)return;const sec=paceSec($("#ans").value);const fb=$("#rfb");
    if(sec==null){fb.style.color="var(--bad)";fb.textContent=t('wrongAns');return;}
    if(Math.abs(sec-target)<=(r.tolSec||15)){win();return;}
    maxPts=Math.max(300,maxPts-150);upd();fb.style.color="var(--bad)";fb.textContent=t('wrongAns');$("#ans").classList.add("shake");setTimeout(()=>$("#ans").classList.remove("shake"),400);}
  $("#ok").onclick=tryA;$("#ans").addEventListener("keydown",e=>{if(e.key==="Enter")tryA();});$("#ans").focus();

/* ---- GeoGuessr : situer un lieu sur la carte de Lyon ---- */
function haversine(la1,lo1,la2,lo2){const R=6371000,toR=x=>x*Math.PI/180,dLa=toR(la2-la1),dLo=toR(lo2-lo1),a=Math.sin(dLa/2)**2+Math.cos(toR(la1))*Math.cos(toR(la2))*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(a));}
function geo(r){
  stage.innerHTML=hud()+`<div class="card">
    <span class="kicker">${t('challengeOf')} ${esc(r.who)}</span>
    <h2 style="margin:2px 0 8px">📍 ${r["q"+up()]}</h2>

      <div class="qbody">
        <div id="geomap" style="height:44vh;min-height:280px;border-radius:14px;overflow:hidden;border:2px solid var(--line)"></div>
        <div class="row"><button class="btn" id="geook" disabled>${t('validate')}</button></div>
        <div id="gfb" class="muted" style="margin-top:6px;font-size:.9em">${t('geoHint')}</div>
      </div>
    </div>
    <div id="mfb"></div></div>`;
  let map,guess=null,gm=null,answered=false;
  setTimeout(()=>{
    if(!window.L){$("#gfb").textContent=t('geoNoMap');return;}
    map=L.map('geomap').setView([45.752,4.832],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
    map.on('click',e=>{if(answered)return;guess=e.latlng;if(gm)map.removeLayer(gm);gm=L.marker(guess).addTo(map);$("#geook").disabled=false;});
    setTimeout(()=>map.invalidateSize(),250);
  },80);
  $("#geook").onclick=()=>{
    if(answered||!guess)return;answered=true;$("#geook").disabled=true;
    const tg=r.target,d=haversine(guess.lat,guess.lng,tg.lat,tg.lng);
    L.circleMarker([tg.lat,tg.lng],{radius:10,color:'#051E50',weight:3,fillColor:'#FFD700',fillOpacity:1}).addTo(map);
    L.polyline([[guess.lat,guess.lng],[tg.lat,tg.lng]],{color:'#FFD700',weight:3,dashArray:'6 6'}).addTo(map);
    map.fitBounds([[guess.lat,guess.lng],[tg.lat,tg.lng]],{padding:[40,40]});
    const pts=d<200?1000:d<600?820:d<1200?640:d<2500?440:d<5000?260:120;
    const ok=d<1200,dist=d<1000?Math.round(d)+' m':(d/1000).toFixed(1)+' km';
    if(!S.done[r.id]){S.done[r.id]=true;S.scores[r.id]=pts;S.km+=r.km;S.dplus+=r.dplus;S.total+=pts;if(ok){S.streak=(S.streak||0)+1;}else S.streak=0;}
    sfx(ok?'good':'bad');if(ok)burst();
    $("#mfb").innerHTML=`<div class="feedback ${ok?'good':'meh'}">${ok?(lang==='fr'?'Bien visé !':'Nice aim!'):(lang==='fr'?'Pas tout près…':'Not quite…')} ${lang==='fr'?'À':'Within'} <b>${dist}</b>. +${pts} pts. ${r["reveal"+up()]}</div>
      <div class="row"><button class="btn" id="cont">${firstOpenIdx()===-1?t('summitBtn'):t('nextRavito')}</button></div>`;
    bindCont();
  };
}
/* ---- Taquin : reconstituer une photo ---- */
function neighbors(i,N){const r=Math.floor(i/N),c=i%N,a=[];if(r>0)a.push(i-N);if(r<N-1)a.push(i+N);if(c>0)a.push(i-1);if(c<N-1)a.push(i+1);return a;}
function puzzle(r){
  const N=3,T=N*N;let arr,e;
  do{arr=[...Array(T).keys()];e=T-1;for(let k=0;k<30;k++){const adj=neighbors(e,N),p=adj[Math.floor(Math.random()*adj.length)];[arr[e],arr[p]]=[arr[p],arr[e]];e=p;}}while(arr.every((v,i)=>v===i));
  let answered=false,moves=0,left=CONFIG.chronoSeconds+40;
  stage.innerHTML=hud()+`<div class="card">
    <span class="kicker">${t('challengeOf')} ${esc(r.who)}</span>
    <h2>🧩 ${t('puzzleTitle')}</h2>${r.noteFR?`<p class="muted" style="font-style:italic">${esc(lang==='fr'?r.noteFR:r.noteEN)}</p>`:''}<p class="muted">${t('puzzleSub')} <b id="chrono">${left}s</b></p>
    <div id="pz" style="width:min(440px,86vw);aspect-ratio:3/2;margin:10px auto;position:relative;border-radius:12px;overflow:hidden;border:3px solid var(--gold);background:#0a1c3f"></div>
    <div class="row" style="justify-content:center"><button class="btn sm ghost" id="pzundo">↩︎ ${lang==='fr'?'Annuler':'Undo'}</button><button class="btn sm ghost" id="pzskip">${t('skip')}</button></div>
    <div id="mfb"></div></div>`;
  const pz=$("#pz");
  function draw(){const w=pz.clientWidth||400,h=pz.clientHeight||266,cw=w/N,ch=h/N;pz.innerHTML='';
    arr.forEach((v,pos)=>{if(v===T-1)return;const sx=v%N,sy=Math.floor(v/N),pr=Math.floor(pos/N),pc=pos%N;
      const d=document.createElement('div');
      d.style.cssText=`position:absolute;width:${cw}px;height:${ch}px;left:${pc*cw}px;top:${pr*ch}px;background-image:url('${src(r.photo)}');background-size:${w}px ${h}px;background-position:${-sx*cw}px ${-sy*ch}px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);cursor:pointer;transition:left .14s,top .14s`;
      d.onclick=()=>mv(pos);pz.appendChild(d);});}
  const hist=[];
  function mv(pos){if(answered)return;const em=arr.indexOf(T-1);if(neighbors(em,N).includes(pos)){hist.push([em,pos]);[arr[em],arr[pos]]=[arr[pos],arr[em]];moves++;draw();if(arr.every((v,i)=>v===i))win();}}
  function undo(){if(answered||!hist.length)return;const [a,b]=hist.pop();[arr[a],arr[b]]=[arr[b],arr[a]];moves++;draw();}
  function win(){answered=true;clearInterval(S.timer);$("#mfb").innerHTML=award(r,Math.max(350,1000-moves*6),true,r["reveal"+up()]);bindCont();burst();}
  $("#pzundo").onclick=undo;
  $("#pzskip").onclick=()=>{clearInterval(S.timer);if(!S.done[r.id]){S.done[r.id]=true;S.scores[r.id]=0;S.km+=r.km;S.dplus+=r.dplus;}afterChallenge();};
  setTimeout(draw,90);
  if(S.timer)clearInterval(S.timer);
  S.timer=setInterval(()=>{left--;const c=$("#chrono");if(c)c.textContent=left+"s";if(left<=0){clearInterval(S.timer);if(!answered){answered=true;$("#mfb").innerHTML=award(r,350,false,r["reveal"+up()]);bindCont();}}},1000);
}

  im.style.cssText="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 18%";im.onerror=()=>{im.remove();el.textContent=initial(name);};el.textContent="";el.appendChild(im);}}

function lsMots(){try{return JSON.parse(localStorage.getItem('mots_laurina')||'[]')}catch(e){return[]}}
async function addMot(m){
  try{const r=await fetch(MOTS_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({who:m.who,note:m.note,score:m.score})});if(!r.ok)throw 0;return;}
  catch(e){const a=lsMots();a.push(m);localStorage.setItem('mots_laurina',JSON.stringify(a));}
}
async function getMots(){
  try{const r=await fetch(MOTS_API,{cache:'no-store'});if(!r.ok)throw 0;const data=await r.json();return (data||[]).map(x=>({who:x.who,fr:x.note,en:x.note,score:(x.score==null?10:x.score)}));}
  catch(e){return lsMots().map(r=>({who:r.who,fr:r.note,en:r.note,score:(r.score==null?10:r.score)}));}
}
function motslist(){
  if(sessionStorage.getItem('tl_admin')!=='1'){
    stage.innerHTML=`<div class="card" style="max-width:420px;margin:30px auto;text-align:center">
      <span class="kicker">🔒 Privé</span><h2>Les mots reçus</h2>
      <p class="muted">Page réservée. Entre le code admin.</p>
      <input type="password" id="apw" style="text-transform:none;letter-spacing:1px;text-align:center" placeholder="Code admin" autocomplete="off">
      <div id="afb" style="color:var(--bad);font-weight:bold;margin-top:8px"></div>
      <div class="row" style="justify-content:center"><button class="btn" id="aok">Entrer</button></div></div>`;
    const tryp=()=>{if($("#apw").value===CONFIG.adminCode){sessionStorage.setItem('tl_admin','1');motslist();}else{$("#afb").textContent='Code incorrect.';$("#apw").value='';}};
    $("#aok").onclick=tryp;$("#apw").addEventListener('keydown',e=>{if(e.key==='Enter')tryp();});$("#apw").focus();
    return;
  }
  stage.innerHTML=`<div class="card"><span class="kicker">💌 Privé · juste pour toi</span><h1>Les mots reçus</h1>
    <p class="muted" id="acount">Chargement…</p>
    <div id="alist"></div>
    <div id="awho" style="margin-top:14px"></div>
    <div class="row"><button class="btn ghost" id="arefresh">🔄 Rafraîchir</button></div></div>`;
  $("#arefresh").onclick=()=>loadAdminList();
  loadAdminList();
}
async function loadAdminList(){
  let mots=[];try{mots=await getMots();}catch(e){}
  const all=[...CONFIG.cnps,...mots];
  const avg=all.length?(all.reduce((s,c)=>s+(c.score==null?10:c.score),0)/all.length).toFixed(1):"·";
  const cnt=$("#acount");if(cnt)cnt.innerHTML=`<b style="color:var(--navy)">${all.length}</b> mot${all.length>1?'s':''} reçu${all.length>1?'s':''} · cNPS moyen <b style="color:var(--navy)">${avg}</b>/10`;
  const box=$("#alist");if(box)box.innerHTML=all.length?all.map(c=>`<div class="msg" style="text-align:left;margin:8px 0"><div class="who"><b>${esc(c.who)}</b> · ${c.score==null?10:c.score}/10</div><div class="note">${esc(c[lang]||c.fr||c.en||'')}</div></div>`).join(''):'<p class="muted">Aucun mot pour l\'instant.</p>';
  const who=$("#awho");
  if(who){const names=[...new Set(all.map(c=>(c.who||'').trim()).filter(Boolean))];
    who.innerHTML=names.length?`<h2 style="margin-bottom:4px">Déjà reçu de (${names.length})</h2><p class="muted" style="margin-top:0">${names.map(esc).join(' · ')}</p><p class="muted" style="font-size:.85em">👉 Compare à ta liste d'équipe pour savoir qui relancer.</p>`:'';}
}
function getBest(){try{return +localStorage.getItem('tl_best')||0}catch(e){return 0}}
function setBest(v){try{localStorage.setItem('tl_best',v)}catch(e){}}
async function saveScore(rec){try{await fetch('/api/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)});}catch(e){}}
function addword(){stage.innerHTML=`${S.motMode?`<div style="text-align:center;margin:14px 0 22px">
    <img src="LN/logo-rubix.png" alt="RUBIX" style="height:clamp(40px,8vw,68px);width:auto;border-radius:8px" onerror="this.outerHTML='<div style=\\'font-size:clamp(1.8em,6vw,3em);font-weight:bold;color:#FFD700\\'>RUBIX</div>'">
    <div style="font-size:clamp(1.5em,5vw,2.6em);letter-spacing:4px;color:#FFD700;font-weight:bold;margin-top:6px;text-shadow:0 2px 10px rgba(0,0,0,.35)">THE LAST TRAIL</div></div>`:''}<div class="card">${S.motMode?'':'<span class="kicker">💌</span>'}<h1>${t('awTitle')}</h1>
  ${S.motMode?`<p class="muted" style="margin-top:-4px">${lang==='fr'?'Laisse un petit mot à Laurina 💛 Elle le découvrira à la fin de son aventure.':'Leave a little note for Laurina 💛 She will discover it at the end of her adventure.'}</p>`:''}
  <label class="muted">${t('awName')}</label><input type="text" id="awn">
  <label class="muted" style="display:block;margin-top:12px">${t('awMsg')}</label>
  <textarea id="awm" maxlength="5000" style="width:100%;border:2px solid var(--line);border-radius:12px;padding:12px;font-family:inherit;font-size:1em;min-height:110px"></textarea>
  <div class="muted" style="font-size:.78em;text-align:right;margin-top:2px"><span id="awcount">0</span> / 5000 ${lang==='fr'?'caractères':'characters'}</div>
  <label class="muted" style="display:block;margin-top:12px">${t('awScore')} : <b id="awsv">10</b>/10</label>
  <input type="range" id="aws" min="0" max="10" value="10" style="width:100%">
  <p class="muted" style="font-size:.82em;margin-top:4px;font-style:italic">cNPS = <b>C</b>olleague <b>N</b>et <b>P</b>romoter <b>S</b>core 😉</p>
  <div id="awfb" style="margin-top:12px;font-weight:bold"></div>
  <div class="row"><button class="btn" id="awsend">${t('awSend')}</button>${S.motMode?'':`<button class="btn ghost" id="awback">${t('awBack')}</button>`}</div></div>`;
  $("#aws").oninput=e=>$("#awsv").textContent=e.target.value;
  $("#awm").oninput=e=>$("#awcount").textContent=e.target.value.length;
  const bk=$("#awback");if(bk)bk.onclick=()=>{S.view=(firstOpenIdx()===-1)?"finish":"map";render();};
  $("#awsend").onclick=async()=>{const who=$("#awn").value.trim(),note=$("#awm").value.trim(),score=+$("#aws").value;const fb=$("#awfb");
    if(!who||!note){fb.style.color="var(--bad)";fb.textContent=t('awEmpty');return;}$("#awsend").disabled=true;
    try{await addMot({who,note,score});fb.style.color="var(--ok)";fb.textContent=t('awThanks');burst(22);$("#awn").value="";$("#awm").value="";setTimeout(()=>{$("#awsend").disabled=false;},800);}
    catch(e){fb.style.color="var(--bad)";fb.textContent=t('awErr');$("#awsend").disabled=false;}};
}

/* =========================== lang / present / confetti / music / cd =========================== */
function setLang(l){lang=l;document.documentElement.lang=l;$("#langFR").classList.toggle("active",l==="fr");$("#langEN").classList.toggle("active",l==="en");render();}
$("#langFR").onclick=()=>setLang("fr");$("#langEN").onclick=()=>setLang("en");
$("#presBtn").onclick=()=>{document.body.classList.toggle("present");$("#presBtn").classList.toggle("active",document.body.classList.contains("present"));};
$("#restartBtn").onclick=()=>{if(S.timer)clearInterval(S.timer);S={view:"intro",current:0,done:{},scores:{},km:0,dplus:0,total:0,timer:null,raph:{},lastShown:null,ravSeen:{}};render();};
const cv=$("#confetti"),cx=cv.getContext("2d");let parts=[];
function size(){cv.width=innerWidth;cv.height=innerHeight;}size();addEventListener("resize",size);
function burst(n=28){for(let i=0;i<n;i++)parts.push(mk());}function bigBurst(){burst(150);}
function mk(){const c=["#FFD700","#051E50","#fff","#e6c200","#1f9d55"];return{x:Math.random()*cv.width,y:-20,vx:(Math.random()-.5)*4,vy:Math.random()*3+2,s:Math.random()*8+4,col:c[parts.length%5],rot:Math.random()*6,vr:(Math.random()-.5)*.3,life:130};}
function loop(){cx.clearRect(0,0,cv.width,cv.height);parts=parts.filter(p=>p.life>0);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.rot+=p.vr;p.life--;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.col;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cx.restore();});requestAnimationFrame(loop);}
loop();
let actx=null;
function sfx(kind){try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);const n=actx.currentTime;
  if(kind==='good'){o.type='sine';o.frequency.setValueAtTime(660,n);o.frequency.setValueAtTime(880,n+.09);g.gain.setValueAtTime(.16,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.start(n);o.stop(n+.26);}
  else{o.type='square';o.frequency.setValueAtTime(180,n);g.gain.setValueAtTime(.14,n);g.gain.exponentialRampToValueAtTime(.001,n+.22);o.start(n);o.stop(n+.23);}}catch(e){}}
const bgm=$("#bgm");let musicOn=false;
function initMusic(){bgm.volume=.42;}
function pickMusic(view){if(!CONFIG.music)return;const tr=CONFIG.music[view]||CONFIG.music.map||CONFIG.music.intro;if(tr&&bgm.dataset.cur!==tr){bgm.dataset.cur=tr;bgm.src=src(tr);if(musicOn)bgm.play().catch(()=>{});}}
function toggleMusic(force){if(!CONFIG.music)return;musicOn=(force!==undefined)?force:!musicOn;if(musicOn){if(!bgm.src)pickMusic(S.view);bgm.play().then(()=>{}).catch(()=>{musicOn=false;$("#musicBtn").textContent="🔇";});}else bgm.pause();$("#musicBtn").textContent=musicOn?"🔊":"🔇";}
$("#musicBtn").onclick=()=>toggleMusic();
function updateCountdown(){const cd=$("#cd");if(!cd)return;let d=new Date(CONFIG.deadline).getTime()-Date.now();
  if(d<=0){cd.classList.add("over");cd.textContent=(lang==='fr'?"clôturé le 8 juil.":"closed Jul 8");return;}
  const j=Math.floor(d/864e5);d-=j*864e5;const h=Math.floor(d/36e5);d-=h*36e5;const m=Math.floor(d/6e4);cd.textContent=`⏳ ${j}j ${h}h ${m}m`;}

/* =========================== boot =========================== */
initMusic();
if(location.hash==="#clear"){try{localStorage.removeItem('mots_laurina');alert('Notes locales effacées.');}catch(e){}location.hash='';}
if(location.hash==="#mot"){S.motMode=true;S.view="addword";}
if(location.hash==="#liste")S.view="motslist";
if(S.motMode){['restartBtn','musicBtn','presBtn','cd'].forEach(id=>{const b=document.getElementById(id);if(b)b.style.display='none';});const br=document.querySelector('.brand');if(br)br.style.display='none';}
else document.addEventListener("pointerdown",()=>toggleMusic(true),{once:true});
setLang("fr");render();updateCountdown();setInterval(updateCountdown,1000);
</script>
</body>
